# Render Blueprint — only declares the static site so we can declaratively
# configure the SPA rewrite rule (Render's `_redirects` file is not honored
# for static sites; routes must live in render.yaml or the dashboard).
#
# The `max-profit-calculator` web service is intentionally NOT redeclared
# because it's already managed via the Render dashboard and uses Docker.
# Adding it here would risk Render treating the existing service as out of
# band and attempting to recreate it.
#
# See https://docs.render.com/redirects-rewrites and
# https://docs.render.com/blueprint-spec

services:
  - type: static
    name: max-profit-frontend
    rootDir: site/frontend
    buildCommand: npm run build
    publishPath: dist
    plan: starter
    autoDeploy: true
    routes:
      # Single Page App fallback — all unmatched routes serve index.html so
      # React Router (BrowserRouter) can take over on the client.
      - type: rewrite
        source: /*
        destination: /index.html
