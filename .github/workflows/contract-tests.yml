# Contract Tests Workflow
# Runs Pact contract tests using self-hosted Pact Broker on Mac Mini

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

name: Contract Tests

jobs:
  frontend-contract-tests:
    runs-on: [self-hosted, osx, arm64, pact-broker]
    steps:
      - name: Start Pact Broker
        run: |
          cd ~/pact-broker-docker && docker-compose up -d
          sleep 10

      - name: Checkout Repository
        uses: actions/checkout@v6.0.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: site/frontend
        run: npm ci

      - name: Run Frontend Pact Tests
        working-directory: site/frontend
        run: npm run test:pact
        env:
          VITE_API_URL: http://localhost:3000

      - name: Publish Pacts to Broker
        working-directory: site/frontend
        run: |
          npm install -g @pact-foundation/pact-cli
          pact-broker publish pacts/ \
            --broker-base-url=http://localhost:8080 \
            --consumer-app-version=${{ github.sha }} \
            --tag=latest

  backend-contract-tests:
    runs-on: [self-hosted, osx, arm64, pact-broker]
    needs: frontend-contract-tests
    steps:
      - name: Start Pact Broker
        run: |
          cd ~/pact-broker-docker && docker-compose up -d
          sleep 10

      - name: Checkout Repository
        uses: actions/checkout@v6.0.1

      - name: Set up JDK 17
        uses: actions/setup-java@v5.1.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build App
        run: mvn package -DskipTests

      - name: Start Backend
        run: |
          java -jar target/*.jar &
          echo $! > backend.pid
          sleep 30
          curl -s http://localhost:9095/api/health || exit 1

      - name: Run Broker Contract Tests
        run: |
          mvn test -Pcontract-tests \
            -Dpactbroker.host=http://localhost:8080 \
            -Dpact.provider.version=${{ github.sha }} \
            -Dpact.verifier.publishResults=true

      - name: Report Contract Test Results
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          check_name: "Contract Test Results"
          detailed_summary: true
          include_passed: true
          annotate_notice: false
          fail_on_failure: false

  can-i-deploy:
    runs-on: [self-hosted, osx, arm64, pact-broker]
    needs: [frontend-contract-tests, backend-contract-tests]
    steps:
      - name: Start Pact Broker
        run: |
          cd ~/pact-broker-docker && docker-compose up -d
          sleep 10

      - name: Install Pact CLI
        run: npm install -g @pact-foundation/pact-cli

      # Check if the latest versions of all pacticipants are mutually compatible
      # This is a "can I merge" check without recording any deployment
      - name: Can I Deploy (Compatibility Check)
        run: |
          pact broker can-i-deploy \
            --broker-base-url=http://localhost:8080 \
            --pacticipant frontend \
            --latest \
            --pacticipant max-profit-calculator-backend \
            --latest