# Contract Tests Workflow
# Runs Pact contract tests - can-i-deploy runs separately on deployment

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

name: Contract Tests

env:
  PACT_BROKER_URL: https://no-company-399294d1.pactflow.io

jobs:
  frontend-contract-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: site/frontend
        run: npm ci

      - name: Run Frontend Pact Tests
        working-directory: site/frontend
        run: npm run test:pact
        env:
          VITE_API_URL: http://localhost:3000

      - name: Determine tag
        id: determine-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=main" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish Pacts to Broker
        working-directory: site/frontend
        run: |
          npm install -g @pact-foundation/pact-cli
          pact-broker publish pacts/ \
            --broker-base-url=${{ env.PACT_BROKER_URL }} \
            --broker-token=${{ secrets.PACT_BROKER_TOKEN }} \
            --consumer-app-version=${{ github.sha }} \
            --branch=${{ steps.determine-tag.outputs.tag }}

  backend-contract-tests:
    runs-on: ubuntu-22.04
    needs: frontend-contract-tests
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.1

      - name: Set up JDK 17
        uses: actions/setup-java@v5.1.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build App
        run: mvn package -DskipTests

      - name: Start Backend
        run: |
          java -jar target/*.jar &
          echo $! > backend.pid
          sleep 30
          curl -s http://localhost:9095/api/health || exit 1

      - name: Run Broker Contract Tests
        run: |
          mvn test -Pcontract-tests \
            -Dpact.broker.url=${{ env.PACT_BROKER_URL }} \
            -Dpact.broker.auth.token=${{ secrets.PACT_BROKER_TOKEN }} \
            -Dpact.provider.version=${{ github.sha }} \
            -Dpact.verifier.publishResults=true
        continue-on-error: true

      - name: Report Contract Test Results
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          check_name: "Contract Test Results"
          detailed_summary: true
          include_passed: true
          annotate_notice: false
          fail_on_failure: false

  can-i-deploy:
    runs-on: ubuntu-22.04
    needs: [frontend-contract-tests, backend-contract-tests]
    steps:
      - name: Install Pact CLI
        run: npm install -g @pact-foundation/pact-cli

      - name: Can I Deploy
        run: |
          pact-broker can-i-deploy \
            --broker-base-url=${{ env.PACT_BROKER_URL }} \
            --broker-token=${{ secrets.PACT_BROKER_TOKEN }} \
            --pacticipant=frontend \
            --version=${{ github.sha }} \
            --pacticipant=max-profit-calculator-backend \
            --version=${{ github.sha }} \
            --to-environment=main
        continue-on-error: true
