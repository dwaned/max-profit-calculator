# Contract Tests Workflow
# Runs Pact contract tests and can-i-deploy check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

name: Contract Tests

jobs:
  contract-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.1

      - name: Set up JDK 17
        uses: actions/setup-java@v5.1.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run Contract Tests (Pact)
        run: |
          mvn test -Pcontract-tests
        env:
          PACT_BROKER_URL: https://no-company-399294d1.pactflow.io
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

      - name: Report Contract Test Results
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          check_name: "Contract Test Results"
          detailed_summary: true
          include_passed: true
          annotate_notice: false
          fail_on_failure: true

      - name: Can I Deploy
        if: github.event_name == 'pull_request'
        run: |
          curl -s -X GET "https://no-company-399294d1.pactflow.io/can-i-deploy" \
            -H "Authorization: Bearer ${{ secrets.PACT_BROKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"provider":"max-profit-calculator-backend","consumer":"frontend","version":"${{ github.sha }}","to":"production"}' | tee response.json
          grep -q '"ready":true' response.json && echo "✅ Can deploy!" || (echo "❌ Cannot deploy!" && exit 1)
