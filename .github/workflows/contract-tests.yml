# Contract Tests Workflow
# Runs Pact contract tests - can-i-deploy runs separately on deployment

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

name: Contract Tests

jobs:
  backend-contract-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.1

      - name: Set up JDK 17
        uses: actions/setup-java@v5.1.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run Contract Tests (Pact)
        run: |
          mvn test -Pcontract-tests

      - name: Report Contract Test Results
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          check_name: "Contract Test Results"
          detailed_summary: true
          include_passed: true
          annotate_notice: false
          fail_on_failure: true

  frontend-contract-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: site/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: site/frontend
        run: npm ci

      - name: Run Frontend Pact Tests
        working-directory: site/frontend
        run: npm run test:pact
        env:
          VITE_API_URL: http://localhost:3000

      - name: Publish Pacts to Broker
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        working-directory: site/frontend
        run: |
          npm install -g @pact-foundation/pact-cli
          pact-broker publish pacts/ \
            --broker-base-url=${{ secrets.PACT_BROKER_URL }} \
            --broker-token=${{ secrets.PACT_BROKER_TOKEN }} \
            --consumer-app-version=${{ github.sha }}
        env:
          PACT_BROKER_URL: https://no-company-399294d1.pactflow.io
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
