---
version: "3.8"
services:
  app:
    build: .
    image: max-profit-calculator-app:latest
    ports:
      - "9095:9095"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9095/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: site/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
