---
version: "3.7"
services:
  app:
    build: .
    expose:
      - 9095
    ports:
      - "9095:9095"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9095/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
  site:
    build:
      context: site/frontend
      dockerfile: Dockerfile
    expose:
      - 80
    ports:
      - "3000:80"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 5
